<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论坛管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">
    <section class="panel">
        <h2 class="panel-title">论坛管理</h2>
        <div class="toolbar forum-toolbar">
            <select class="select" id="adminCategory">
                <option value="">全部分类</option>
                <option>约球组队</option><option>技术交流</option><option>赛事活动</option>
                <option>场地反馈</option><option>失物招领</option><option>其他</option>
            </select>
            <select class="select" id="adminStatus">
                <option value="">全部状态</option><option value="normal">正常</option>
                <option value="hidden">已隐藏</option><option value="deleted">已删除</option>
            </select>
            <input class="input forum-search" id="adminKeyword" type="search" placeholder="搜索帖子">
            <button class="btn secondary" id="adminSearch" type="button">查询</button>
        </div>
        <div class="table-wrap">
            <table id="forumPostTable">
                <thead><tr><th>ID</th><th>标题</th><th>分类</th><th>作者</th><th>状态</th><th>浏览/回复</th><th>发布时间</th><th>操作</th></tr></thead>
                <tbody><tr><td colspan="8">加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="adminPostPagination" class="pagination"></div>
    </section>

    <section class="panel">
        <h2 class="panel-title">举报处理</h2>
        <div class="toolbar">
            <select class="select" id="reportStatus">
                <option value="">全部举报</option><option value="pending">待处理</option>
                <option value="resolved">已处理</option><option value="rejected">已驳回</option>
            </select>
            <button class="btn secondary" id="loadReports" type="button">查询</button>
        </div>
        <div class="table-wrap">
            <table id="forumReportTable">
                <thead><tr><th>ID</th><th>举报人</th><th>对象</th><th>原因</th><th>状态</th><th>时间</th><th>处理</th></tr></thead>
                <tbody><tr><td colspan="7">加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="adminReportPagination" class="pagination"></div>
    </section>
</div>

<div id="adminPostModal" class="modal">
    <div class="modal-content forum-admin-modal">
        <div class="modal-header"><h3>帖子详情</h3><button class="close-btn" id="closeAdminPost" type="button">&times;</button></div>
        <div id="adminPostDetail"></div>
    </div>
</div>

<div id="reportHandleModal" class="modal">
    <div class="modal-content forum-report-modal">
        <div class="modal-header">
            <h3 id="reportHandleTitle">处理举报</h3>
            <button class="close-btn" id="closeReportHandle" type="button">&times;</button>
        </div>
        <form id="reportHandleForm" class="form-grid">
            <label>处理说明
                <textarea class="textarea" id="reportHandleResult" maxlength="200" placeholder="可填写处理结果或驳回原因"></textarea>
            </label>
            <p id="reportHandleMessage" class="form-message"></p>
            <div class="modal-actions">
                <button class="btn secondary" id="cancelReportHandle" type="button">取消</button>
                <button class="btn" id="confirmReportHandle" type="submit">确认</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin-forum.js"></script>
</body>
</html>
