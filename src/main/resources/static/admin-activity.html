<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动列表</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">
    <!-- Add / Edit Form -->
    <section class="panel">
        <h2 class="panel-title" id="formTitle">新增活动</h2>
        <div style="display:flex;gap:0;align-items:center;padding:0 32px;">
            <form id="activityForm" class="form-grid" style="width:420px;flex-shrink:0;padding-right:28px;border-right:1px dashed #b7c1cc;margin-right:48px;">
                <input type="hidden" id="editId">
                <input type="hidden" id="actImage">
                <label>
                    活动标题
                    <input class="input" type="text" id="actTitle" required placeholder="请输入活动标题">
                </label>
                <label>
                    活动时间
                    <input class="input" type="text" id="actTime" required placeholder="如：2026-07-10 14:00">
                </label>
                <label>
                    活动地点
                    <input class="input" type="text" id="actLocation" required placeholder="如：体育馆A馆">
                </label>
                <label>
                    活动描述
                    <input class="input" type="text" id="actDesc" placeholder="活动描述（可选）">
                </label>
                <div style="display:flex;gap:10px;justify-content:center;">
                    <button class="btn" type="submit" id="submitBtn">添加活动</button>
                    <button class="btn secondary" type="button" id="cancelEditBtn" style="display:none;">取消编辑</button>
                </div>
            </form>
            <!-- Image upload area -->
            <div class="cover-upload-area" style="flex:1;display:flex;justify-content:center;">
                <label class="cover-upload-wrap" id="coverUploadWrap" title="点击上传封面图">
                    <img id="actImagePreview" class="cover-preview" src="" alt="活动封面" style="display:none;">
                    <div class="cover-placeholder" id="coverPlaceholder">
                        <span class="cover-placeholder-icon">🖼️</span>
                        <span class="cover-placeholder-text">点击上传封面图</span>
                    </div>
                    <span class="cover-upload-hint">更换封面图</span>
                    <input type="file" id="actImageFile" accept="image/*" style="display:none;">
                </label>
                <p id="uploadMsg" class="cover-upload-msg"></p>
            </div>
        </div>
    </section>

    <!-- Activity List -->
    <section class="panel">
        <h2 class="panel-title">活动列表</h2>
        <div class="table-wrap">
            <table id="activityTable">
                <thead>
                <tr>
                    <th>序号</th>
                    <th>标题</th>
                    <th>活动时间</th>
                    <th>地点</th>
                    <th>描述</th>
                    <th>报名人数</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</div>

<!-- Signup Detail Modal -->
<div id="signupModal" class="modal">
    <div class="modal-content" style="width:min(700px, calc(100vw - 36px));">
        <div class="modal-header">
            <h3>报名详情 — <span id="signupActivityTitle"></span></h3>
            <button class="close-btn" type="button" id="closeSignupModal">&times;</button>
        </div>
        <div class="signup-export-actions">
            <span class="signup-action-hint" id="signupActionHint" aria-live="polite"></span>
            <button class="btn secondary" type="button" id="generateBracketBtn" disabled>生成比赛签表</button>
            <button class="btn" type="button" id="exportSignupsBtn" disabled>导出 Excel</button>
        </div>
        <div class="table-wrap">
            <table id="signupTable">
                <thead>
                <tr>
                    <th>序号</th>
                    <th>用户头像</th>
                    <th>昵称</th>
                    <th>联系人</th>
                    <th>联系电话</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Tournament Bracket Preview -->
<div id="bracketModal" class="modal">
    <div class="modal-content bracket-modal-content">
        <div class="modal-header">
            <h3>比赛签表 — <span id="bracketActivityTitle"></span></h3>
            <button class="close-btn" type="button" id="closeBracketModal">&times;</button>
        </div>
        <div class="bracket-canvas-wrap">
            <canvas id="bracketCanvas"></canvas>
        </div>
        <div class="modal-actions">
            <button class="btn secondary" type="button" id="rerollBracketBtn">重新抽签</button>
            <button class="btn" type="button" id="downloadBracketBtn">下载签表图</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/activity-bracket.js"></script>
<script src="js/admin-activity.js"></script>
</body>
</html>
