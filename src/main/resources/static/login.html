<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 羽悦预约系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<main class="login-panel">
    <div class="login-brand">羽悦 · 场地预约</div>

    <!-- Tab切换 -->
    <div class="login-tabs">
        <button class="login-tab active" data-tab="login">登录</button>
        <button class="login-tab" data-tab="register">注册</button>
    </div>

    <!-- ========== 登录表单 ========== -->
    <form id="loginForm" class="login-form">
        <label>
            用户名 / 手机号
            <input class="input" id="loginUsername" type="text" placeholder="输入用户名或手机号" required>
        </label>
        <label>
            密码
            <input class="input" id="loginPassword" type="password" placeholder="输入密码" required>
        </label>
        <button class="btn login-submit" type="submit">登录</button>
        <p id="loginMsg" class="login-msg"></p>
    </form>

    <!-- ========== 注册表单 ========== -->
    <form id="registerForm" class="login-form" style="display:none;">
        <!-- 头像上传 -->
        <label class="register-avatar-label">
            <div class="register-avatar-box">
                <img id="avatarPreview" src="https://cube.elemecdn.com/9/c2/f0ee8a3c7c9638a54940382568c9dpng.png" alt="头像">
                <span class="register-avatar-hint">点击上传头像</span>
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        </label>

        <label>
            手机号
            <input class="input" id="regPhone" type="tel" maxlength="11" placeholder="请输入手机号" required>
        </label>
        <div class="sms-row">
            <label style="flex:1;">
                验证码
                <input class="input" id="regCode" type="text" maxlength="6" placeholder="6位验证码" required>
            </label>
            <button type="button" id="sendCodeBtn" class="btn sms-btn">获取验证码</button>
        </div>
        <label>
            用户名
            <input class="input" id="regUsername" type="text" placeholder="设置登录用户名" required>
        </label>
        <label>
            昵称
            <input class="input" id="regNickname" type="text" placeholder="设置显示昵称（可选）">
        </label>
        <label>
            性别
            <select class="select" id="regGender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </label>
        <label>
            密码
            <input class="input" id="regPassword" type="password" placeholder="设置密码" required>
        </label>
        <button class="btn login-submit" type="submit">注册</button>
        <p id="registerMsg" class="login-msg"></p>
    </form>
</main>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
