<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽悦羽毛球场地预约系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-shell">
<header class="topbar">
    <div class="brand">羽悦 · 羽毛球场地预约系统</div>
    <div class="welcome">
        <span id="welcomeName">欢迎回来</span>
        <img id="welcomeAvatar" src="https://picsum.photos/seed/badminton-user/200/200" alt="用户头像">
        <button class="btn secondary logout-btn" type="button" id="logoutBtn">退出</button>
    </div>
</header>
<main class="layout">
    <nav class="sidebar">
        <a class="nav-link active" href="reservation.html" target="mainFrame">场地预约</a>
        <a class="nav-link" href="activity.html" target="mainFrame">活动列表</a>
        <a class="nav-link" href="info.html" target="mainFrame">我的信息</a>
    </nav>
    <iframe class="main-frame" name="mainFrame" src="reservation.html" title="主内容"></iframe>
</main>
<script src="js/api.js"></script>
<script>
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            document.querySelectorAll('.nav-link').forEach(item => item.classList.remove('active'));
            link.classList.add('active');
        });
    });

    apiGet('/user').then(result => {
        if (result.code === 1 && result.data) {
            document.getElementById('welcomeName').textContent = `欢迎回来，${result.data.nickname}`;
            document.getElementById('welcomeAvatar').src = result.data.avatar || 'https://picsum.photos/seed/badminton-user/200/200';
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await apiPost('/logout', {});
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
