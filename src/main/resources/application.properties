# ===== Server =====
server.port=8080
server.servlet.session.timeout=7200

# ===== Spring =====
spring.application.name=badminton-reservation

# DataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/badminton?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session
spring.session.store-type=none

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=0
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# ===== MyBatis =====
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.mapper-locations=classpath:mapper/*.xml

# ===== PageHelper =====
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true

# ===== 预约业务配置 =====
# 每块场地允许的最大预约人数
app.reservation.max-players-per-court=4
# 可预约的开始小时（24小时制）
app.reservation.start-hour=8
# 可预约的结束小时（24小时制）
app.reservation.end-hour=20
# 支付超时时间（分钟）
app.reservation.payment-timeout-minutes=15
# 可提前核销的时间（分钟）
app.reservation.checkin-advance-minutes=15
# 超过预约开始时间多久后标记为爽约（分钟）
app.reservation.noshow-grace-minutes=30
# 每天开始接受预约的时间，格式为 HH:mm；例如 14:00 表示每天 14:00 前不能创建预约
app.reservation.daily-open-time=00:00

# 定时任务开关；测试环境设为 false，生产环境默认开启
app.scheduling.enabled=true

# ===== 取消退款规则 =====
app.cancel.full-refund-hours=2
app.cancel.half-refund-minutes=30
app.cancel.no-refund-minutes=30

# ===== 阿里云 OSS =====
# OSS 和短信服务共用的阿里云 AccessKey，必须通过环境变量提供
app.oss.endpoint=oss-cn-beijing.aliyuncs.com
app.oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
app.oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
app.oss.bucket-name=my-study-javaweb
app.oss.base-url=https://my-study-javaweb.oss-cn-beijing.aliyuncs.com/

# ===== 阿里云短信 =====
# 短信签名和模板配置，凭据复用上面的阿里云 AccessKey
app.sms.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
app.sms.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
app.sms.sign-name=速通互联验证码
app.sms.template-code=100001
app.sms.code-length=6
app.sms.code-expire-seconds=300
