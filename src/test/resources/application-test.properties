# 测试专用配置：仅用于 SpringBootTest，不连接真实基础设施。
# 数据源只提供占位连接信息，Mapper 在测试中使用 MockBean 替代。
spring.datasource.url=jdbc:mysql://localhost:3307/badminton_test
spring.datasource.username=test
spring.datasource.password=test-only
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=never
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

# 仅用于满足配置占位符，不是真实阿里云凭据。
ALIBABA_CLOUD_ACCESS_KEY_ID=test-access-key
ALIBABA_CLOUD_ACCESS_KEY_SECRET=test-access-secret
# 禁止测试期间的爽约定时扫描修改 Mock 数据。
app.scheduling.enabled=false
